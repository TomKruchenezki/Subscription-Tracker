name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  privacy-and-security:
    name: Privacy compliance + dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install from requirements.txt when it exists (Phase 1+).
          # In Phase 0 only pytest and pip-audit are needed.
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest pytest-cov pip-audit

      - name: Run privacy compliance tests
        # Privacy tests are the build gate — a failure here blocks everything.
        # In Phase 0, tests/privacy/ does not exist yet; the step reports a warning
        # and exits successfully so the scaffold phase is not permanently broken.
        run: |
          if [ -d "tests/privacy" ]; then
            pytest tests/privacy/ -v --tb=short
          else
            echo "WARNING: tests/privacy/ not found — add privacy tests in Phase 1"
            echo "This warning becomes a hard failure once the directory is created."
          fi

      - name: Dependency security audit
        # pip-audit scans for known CVEs in pinned dependencies.
        # Skipped in Phase 0 because requirements.txt does not exist yet.
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "WARNING: requirements.txt not found — add it in Phase 1"
          fi

